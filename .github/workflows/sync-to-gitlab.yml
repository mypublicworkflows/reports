name: Sync to GitLab

on:
  workflow_dispatch:
    inputs:
      sync_mode:
        description: "Sync mode: master or all"
        required: true
        default: "master"
        type: choice
        options:
          - master
          - all
      prune_deleted_branches:
        description: "If 'all', prune GitLab branches deleted on GitHub"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      sync_tags:
        description: "Sync tags"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: sync-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure GitLab remote
        env:
          GITLAB_MIRROR_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
          GITLAB_REPO: ${{ vars.GITLAB_REPO }}
        run: |
          set -euo pipefail
          if [ -z "${GITLAB_MIRROR_TOKEN}" ]; then
            echo "Missing required secret: GITLAB_MIRROR_TOKEN" >&2
            exit 1
          fi
          if [ -z "${GITLAB_REPO}" ]; then
            echo "Missing required variable: GITLAB_REPO" >&2
            exit 1
          fi
          NORMALIZED_REPO="${GITLAB_REPO%/}"
          if [[ ! "${NORMALIZED_REPO}" =~ \.git$ ]]; then
            NORMALIZED_REPO="${NORMALIZED_REPO}.git"
          fi
          if [[ "${NORMALIZED_REPO}" =~ ^https?:// ]]; then
            AUTHED_URL="${NORMALIZED_REPO/https:\/\//https://oauth2:${GITLAB_MIRROR_TOKEN}@}"
            AUTHED_URL="${AUTHED_URL/http:\/\//http://oauth2:${GITLAB_MIRROR_TOKEN}@}"
          else
            AUTHED_URL="https://oauth2:${GITLAB_MIRROR_TOKEN}@${NORMALIZED_REPO}"
          fi
          git remote remove gitlab 2>/dev/null || true
          git remote add gitlab "${AUTHED_URL}"

      - name: Fetch GitHub refs
        run: |
          set -euo pipefail
          git fetch --prune origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"

      - name: Sync to GitLab
        env:
          SYNC_MODE: ${{ inputs.sync_mode }}
          PRUNE: ${{ inputs.prune_deleted_branches }}
          SYNC_TAGS: ${{ inputs.sync_tags }}
        run: |
          set -euo pipefail

          if [ "$SYNC_MODE" = "master" ]; then
            git push --force gitlab "refs/remotes/origin/master:refs/heads/master"
          else
            mapfile -t origin_branches < <(git for-each-ref --format='%(refname:lstrip=3)' refs/remotes/origin | grep -v '^HEAD$')
            for branch in "${origin_branches[@]}"; do
              git push --force gitlab "refs/remotes/origin/${branch}:refs/heads/${branch}"
            done

            if [ "$PRUNE" = "true" ]; then
              git fetch --prune gitlab "+refs/heads/*:refs/remotes/gitlab/*"
              mapfile -t gitlab_branches < <(git for-each-ref --format='%(refname:lstrip=3)' refs/remotes/gitlab | grep -v '^HEAD$')
              for branch in "${gitlab_branches[@]}"; do
                if [[ ! " ${origin_branches[*]} " =~ (^|[[:space:]])"${branch}"($|[[:space:]]) ]]; then
                  git push gitlab ":refs/heads/${branch}"
                fi
              done
            fi
          fi

          if [ "$SYNC_TAGS" = "true" ]; then
            git push gitlab --tags
          fi
