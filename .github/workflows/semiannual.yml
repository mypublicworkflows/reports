name: Semiannual Sialkot Rankings
run-name: publish rankings | super-group:sialkot | semiannual

on:
  schedule:
    - cron: "0 3 5 1,7 *"
  workflow_dispatch:

concurrency:
  group: sialkot-semiannual-rankings
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/manual.yml
    with:
      command: publish
      mode: semiannual
      scope: super-group
      scope_value: sialkot
      kind: rankings
      source_repo_ref: master
      target_site: professionalizeagents.wordpress.com
      target_category: sialkot-agents
      notify_on_update_comments: false
    secrets: inherit
