name: Repo Review Agent

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Workflow action: run generates artifacts, preview builds WordPress email bodies, publish sends through the configured backend"
        required: true
        default: run
        type: choice
        options:
          - run
          - preview
          - publish
      mode:
        description: "Run mode: monthly | quarterly | semiannual | custom"
        required: true
        default: monthly
        type: choice
        options:
          - monthly
          - quarterly
          - semiannual
          - custom
      scope:
        description: "Scope: all | super-group | group | subgroup | repo"
        required: true
        default: all
        type: choice
        options:
          - all
          - super-group
          - group
          - subgroup
          - repo
      scope_value:
        description: "Scope value examples: sialkot | sialkot/lahore-aspose | sialkot/lahore-aspose/team | sialkot/lahore-aspose/team/repo"
        required: false
        type: string
      period_label:
        description: "Optional exact period label for non-custom runs. Examples: 2026-03, 2026-q1, 2026-h1"
        required: false
        type: string
      start:
        description: "Custom start date. Format: YYYY-MM-DD. Example: 2026-01-01"
        required: false
        type: string
      end:
        description: "Custom end date. Format: YYYY-MM-DD. Example: 2026-03-31"
        required: false
        type: string
      kind:
        description: "Report kind used for preview or publish. Ignored when command is run."
        required: true
        default: rankings
        type: choice
        options:
          - rankings
          - group
          - executive
          - repo
          - contributor
  workflow_call:
    inputs:
      command:
        required: true
        type: string
      mode:
        required: true
        type: string
      scope:
        required: true
        type: string
      scope_value:
        required: false
        type: string
      period_label:
        required: false
        type: string
      start:
        required: false
        type: string
      end:
        required: false
        type: string
      kind:
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Checkout source repository
        if: ${{ vars.SOURCE_REPO != '' && vars.SOURCE_REPO != github.repository && vars.SOURCE_REPO_REF == '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          path: source-repo
      - name: Checkout source repository at explicit ref
        if: ${{ vars.SOURCE_REPO != '' && vars.SOURCE_REPO != github.repository && vars.SOURCE_REPO_REF != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ vars.SOURCE_REPO_REF }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          path: source-repo
      - name: Resolve app directory
        shell: bash
        env:
          SOURCE_REPO_PAT: ${{ secrets.SOURCE_REPO_PAT }}
        run: |
          APP_DIR="."
          if [ -n "${{ vars.SOURCE_REPO }}" ] && [ "${{ vars.SOURCE_REPO }}" != "${{ github.repository }}" ]; then
            if [ -z "$SOURCE_REPO_PAT" ]; then
              echo "SOURCE_REPO_PAT must be configured when SOURCE_REPO points to a different repository."
              exit 1
            fi
            APP_DIR="source-repo"
          fi
          if [ ! -f "$APP_DIR/pyproject.toml" ]; then
            echo "No repo-review source tree was found in $APP_DIR."
            echo "If this workflow runs from a public orchestration repo, set SOURCE_REPO and SOURCE_REPO_PAT first."
            exit 1
          fi
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        shell: bash
        run: |
          cd "$APP_DIR"
          python -m pip install -e .[dev]
      - name: Validate workflow inputs
        shell: bash
        run: |
          COMMAND="${{ inputs.command }}"
          MODE="${{ inputs.mode }}"
          SCOPE_INPUT="${{ inputs.scope }}"
          SCOPE_VALUE_INPUT="${{ inputs.scope_value }}"
          DEFAULT_SCOPE="${{ vars.WORKFLOW_TARGET_SCOPE }}"
          DEFAULT_SCOPE_VALUE="${{ vars.WORKFLOW_TARGET_SCOPE_VALUE }}"
          DEFAULT_PERIOD_LABEL="${{ vars.WORKFLOW_TARGET_PERIOD_LABEL }}"
          DEFAULT_DATE_BASIS="${{ vars.WORKFLOW_TARGET_DATE_BASIS }}"
          START="${{ inputs.start }}"
          END="${{ inputs.end }}"
          PERIOD_LABEL_INPUT="${{ inputs.period_label }}"
          KIND="${{ inputs.kind }}"

          SCOPE="$SCOPE_INPUT"
          if [ "$SCOPE_INPUT" = "all" ] && [ -z "$SCOPE_VALUE_INPUT" ] && [ -n "$DEFAULT_SCOPE" ]; then
            SCOPE="$DEFAULT_SCOPE"
          fi

          SCOPE_VALUE="$SCOPE_VALUE_INPUT"
          if [ -z "$SCOPE_VALUE" ] && [ -n "$DEFAULT_SCOPE_VALUE" ]; then
            SCOPE_VALUE="$DEFAULT_SCOPE_VALUE"
          fi

          PERIOD_LABEL="$PERIOD_LABEL_INPUT"
          if [ -z "$PERIOD_LABEL" ] && [ "$MODE" != "custom" ] && [ -n "$DEFAULT_PERIOD_LABEL" ]; then
            PERIOD_LABEL="$DEFAULT_PERIOD_LABEL"
          fi

          DATE_BASIS="$DEFAULT_DATE_BASIS"
          if [ -z "$DATE_BASIS" ]; then
            DATE_BASIS="authored_date"
          fi

          case "$COMMAND" in
            run|preview|publish) ;;
            *)
              echo "command must be one of: run, preview, publish."
              exit 1
              ;;
          esac

          if [ "$SCOPE" != "all" ] && [ -z "$SCOPE_VALUE" ]; then
            echo "scope_value is required when scope is not 'all'."
            exit 1
          fi

          if [ "$MODE" = "custom" ]; then
            if [ -z "$START" ] || [ -z "$END" ]; then
              echo "custom mode requires both start and end in YYYY-MM-DD format."
              exit 1
            fi
          fi

          if [ "$MODE" != "custom" ] && { [ -n "$START" ] || [ -n "$END" ]; }; then
            echo "start/end are only used when mode is custom."
            exit 1
          fi

          if [ "$MODE" = "custom" ] && [ -n "$PERIOD_LABEL" ]; then
            echo "period_label should not be used when mode is custom."
            exit 1
          fi

          case "$KIND" in
            rankings|group|executive|repo|contributor|"") ;;
            *)
              echo "kind must be one of: rankings, group, executive, repo, contributor."
              exit 1
              ;;
          esac

          echo "EFFECTIVE_MODE=$MODE" >> "$GITHUB_ENV"
          echo "EFFECTIVE_SCOPE=$SCOPE" >> "$GITHUB_ENV"
          echo "EFFECTIVE_SCOPE_VALUE=$SCOPE_VALUE" >> "$GITHUB_ENV"
          echo "EFFECTIVE_PERIOD_LABEL=$PERIOD_LABEL" >> "$GITHUB_ENV"
          echo "EFFECTIVE_START=$START" >> "$GITHUB_ENV"
          echo "EFFECTIVE_END=$END" >> "$GITHUB_ENV"
          echo "EFFECTIVE_DATE_BASIS=$DATE_BASIS" >> "$GITHUB_ENV"
      - name: Generate workflow config
        shell: bash
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS }}
          SMTP_SSL: ${{ vars.SMTP_SSL }}
          WORKFLOW_PUBLISHING_BACKEND: ${{ vars.WORKFLOW_PUBLISHING_BACKEND }}
          WORKFLOW_LLM_ENABLED: ${{ vars.WORKFLOW_LLM_ENABLED }}
          WORKFLOW_WORDPRESS_ENABLED: ${{ vars.WORKFLOW_WORDPRESS_ENABLED }}
          WORKFLOW_WORDPRESS_PREVIEW_ONLY: ${{ vars.WORKFLOW_WORDPRESS_PREVIEW_ONLY }}
          WORKFLOW_WORDPRESS_DEFAULT_STATUS: ${{ vars.WORKFLOW_WORDPRESS_DEFAULT_STATUS }}
          WORKFLOW_SMTP_ENABLED: ${{ vars.WORKFLOW_SMTP_ENABLED }}
        run: |
          export WORKFLOW_CONFIG_PATH="$RUNNER_TEMP/repo-review-actions.yaml"
          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          def as_bool(name: str, default: bool) -> bool:
              value = os.getenv(name, "").strip().lower()
              if not value:
                  return default
              return value in {"1", "true", "yes", "on"}

          def as_int(name: str, default: int) -> int:
              value = os.getenv(name, "").strip()
              if not value:
                  return default
              return int(value)

          data = {
              "gitlab": {
                  "base_url": os.getenv("GITLAB_URL", "").strip() or None,
                  "pat_env": "GITLAB_PAT",
                  "include_merge_requests": True,
              },
              "target": {
                  "mode": os.getenv("EFFECTIVE_MODE", "monthly"),
                  "scope": os.getenv("EFFECTIVE_SCOPE", "all"),
                  "scope_value": os.getenv("EFFECTIVE_SCOPE_VALUE", "").strip() or None,
                  "period_label": os.getenv("EFFECTIVE_PERIOD_LABEL", "").strip() or None,
                  "period": {
                      "start": os.getenv("EFFECTIVE_START", "").strip() or None,
                      "end": os.getenv("EFFECTIVE_END", "").strip() or None,
                  },
              },
              "analysis": {
                  "default_date_basis": os.getenv("EFFECTIVE_DATE_BASIS", "authored_date"),
                  "default_timezone": "Asia/Karachi",
                  "category_detection": "hybrid",
                  "classify_unknown_as": "automation_script",
                  "weights_profile": "default",
                  "include_mr_analysis": True,
                  "include_repo_snapshot_analysis": True,
                  "max_run_seconds": 0,
                  "max_project_seconds": 0,
                  "max_semantic_review_seconds": 0,
              },
              "reports": {
                  "output_dir": "artifacts",
                  "save_html": True,
                  "save_json": True,
                  "save_csv": True,
                  "include_confidence_notes": True,
                  "include_fairness_notes": True,
              },
              "rankings": {
                  "enable_overall": True,
                  "enable_category": True,
                  "enable_improvement": True,
                  "enable_watchlist": True,
              },
              "publishing": {
                  "backend": os.getenv("WORKFLOW_PUBLISHING_BACKEND", "").strip() or "wordpress_email",
              },
              "wordpress": {
                  "enabled": as_bool("WORKFLOW_WORDPRESS_ENABLED", False),
                  "email_target_env": "WORDPRESS_POST_EMAIL",
                  "default_status": os.getenv("WORKFLOW_WORDPRESS_DEFAULT_STATUS", "").strip() or "private",
                  "preview_only": as_bool("WORKFLOW_WORDPRESS_PREVIEW_ONLY", True),
                  "default_publish_report_types": [
                      "executive_summary",
                      "group_summary",
                      "rankings_report",
                  ],
                  "category_by_report_type": {
                      "contributor_report": "Contributor Review",
                      "repository_report": "Repository Report",
                      "group_summary": "Monthly Report",
                      "executive_summary": "Executive Summary",
                      "rankings_report": "Rankings",
                  },
              },
              "wordpress_api": {
                  "enabled": True,
                  "site_env": "WORDPRESS_API_SITE",
                  "access_token_env": "WORDPRESS_API_ACCESS_TOKEN",
                  "client_id_env": "WORDPRESS_API_CLIENT_ID",
                  "client_secret_env": "WORDPRESS_API_CLIENT_SECRET",
                  "username_env": "WORDPRESS_API_USERNAME",
                  "password_env": "WORDPRESS_API_PASSWORD",
                  "update_by_slug": True,
              },
              "smtp": {
                  "enabled": as_bool("WORKFLOW_SMTP_ENABLED", True),
                  "host_env": "SMTP_HOST",
                  "port_env": "SMTP_PORT",
                  "username_env": "SMTP_USERNAME",
                  "password_env": "SMTP_PASSWORD",
                  "from_env": "SMTP_FROM",
                  "from_name_env": "SMTP_FROM_NAME",
                  "starttls_env": "SMTP_STARTTLS",
                  "ssl_env": "SMTP_SSL",
                  "default_port": as_int("SMTP_PORT", 587),
                  "default_starttls": as_bool("SMTP_STARTTLS", True),
                  "default_ssl": as_bool("SMTP_SSL", False),
              },
              "resend": {
                  "enabled": False,
              },
              "mailjet": {
                  "enabled": False,
              },
              "llm": {
                  "enabled": as_bool("WORKFLOW_LLM_ENABLED", False),
                  "provider": "professionalize",
                  "base_url_env": "PROFESSIONALIZE_BASE_URL",
                  "api_key_env": "PROFESSIONALIZE_API_KEY",
                  "model_env": "PROFESSIONALIZE_LLM_MODEL",
              },
              "embeddings": {
                  "enabled": False,
                  "provider": "professionalize",
                  "base_url_env": "PROFESSIONALIZE_BASE_URL",
                  "api_key_env": "PROFESSIONALIZE_API_KEY",
                  "model_env": "PROFESSIONALIZE_EMBEDDING_MODEL",
              },
              "storage": {
                  "database_url": "sqlite:///repo_review.db",
              },
          }

          output_path = Path(os.environ["WORKFLOW_CONFIG_PATH"])
          output_path.write_text(yaml.safe_dump(data, sort_keys=False), encoding="utf-8")
          print(f"Generated workflow config at {output_path}")
          PY
          echo "WORKFLOW_CONFIG_PATH=$WORKFLOW_CONFIG_PATH" >> "$GITHUB_ENV"
      - name: Run repo review agent
        shell: bash
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
          WORDPRESS_POST_EMAIL: ${{ secrets.WORDPRESS_POST_EMAIL }}
          WORDPRESS_API_SITE: ${{ secrets.WORDPRESS_API_SITE }}
          WORDPRESS_API_ACCESS_TOKEN: ${{ secrets.WORDPRESS_API_ACCESS_TOKEN }}
          WORDPRESS_API_CLIENT_ID: ${{ secrets.WORDPRESS_API_CLIENT_ID }}
          WORDPRESS_API_CLIENT_SECRET: ${{ secrets.WORDPRESS_API_CLIENT_SECRET }}
          WORDPRESS_API_USERNAME: ${{ secrets.WORDPRESS_API_USERNAME }}
          WORDPRESS_API_PASSWORD: ${{ secrets.WORDPRESS_API_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ vars.SMTP_FROM_NAME }}
          SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS }}
          SMTP_SSL: ${{ vars.SMTP_SSL }}
          PROFESSIONALIZE_API_KEY: ${{ secrets.PROFESSIONALIZE_API_KEY }}
          PROFESSIONALIZE_BASE_URL: ${{ secrets.PROFESSIONALIZE_BASE_URL }}
          PROFESSIONALIZE_LLM_MODEL: ${{ vars.PROFESSIONALIZE_LLM_MODEL }}
          PROFESSIONALIZE_EMBEDDING_MODEL: ${{ vars.PROFESSIONALIZE_EMBEDDING_MODEL }}
        run: |
          cd "$APP_DIR"
          COMMAND="${{ inputs.command }}"
          if [ "$COMMAND" = "run" ]; then
            CMD="python -m repo_review run $EFFECTIVE_MODE --config '$WORKFLOW_CONFIG_PATH' --scope '$EFFECTIVE_SCOPE'"
          else
            CMD="python -m repo_review $COMMAND ${{ inputs.kind }} --config '$WORKFLOW_CONFIG_PATH' --scope '$EFFECTIVE_SCOPE'"
          fi

          if [ -n "$EFFECTIVE_SCOPE_VALUE" ]; then CMD="$CMD --scope-value '$EFFECTIVE_SCOPE_VALUE'"; fi
          if [ -n "$EFFECTIVE_PERIOD_LABEL" ]; then CMD="$CMD --period '$EFFECTIVE_PERIOD_LABEL'"; fi
          if [ -n "$EFFECTIVE_START" ]; then CMD="$CMD --start '$EFFECTIVE_START'"; fi
          if [ -n "$EFFECTIVE_END" ]; then CMD="$CMD --end '$EFFECTIVE_END'"; fi
          if [ -n "$EFFECTIVE_DATE_BASIS" ]; then CMD="$CMD --date-basis '$EFFECTIVE_DATE_BASIS'"; fi

          echo "Executing: $CMD"
          eval "$CMD"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-review-artifacts
          path: |
            artifacts/
            source-repo/artifacts/
