name: Repo Review Agent
run-name: >-
  ${{ inputs.command }} ${{ inputs.kind }} |
  ${{ inputs.scope }}${{ inputs.scope_value != '' && format(':{0}', inputs.scope_value) || '' }} |
  ${{ inputs.mode }}${{ inputs.period_label != '' && format(' {0}', inputs.period_label) || '' }}

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Workflow action: run generates artifacts, preview builds WordPress email bodies, publish sends through the configured backend, republish reuses a saved matching run"
        required: true
        default: run
        type: choice
        options:
          - run
          - preview
          - publish
          - republish
      mode:
        description: "Run mode: monthly | quarterly | semiannual | custom"
        required: true
        default: monthly
        type: choice
        options:
          - monthly
          - quarterly
          - semiannual
          - custom
      scope:
        description: "Scope: all | super-group | group | subgroup | repo"
        required: true
        default: all
        type: choice
        options:
          - all
          - super-group
          - group
          - subgroup
          - repo
      scope_value:
        description: "Scope value examples: sialkot | sialkot/lahore-aspose | sialkot/lahore-aspose/team | sialkot/lahore-aspose/team/repo"
        required: false
        type: string
      period_label:
        description: "Optional exact period label for non-custom runs. Examples: 2026-03, 2026-q1, 2026-h1"
        required: false
        type: string
      start:
        description: "Custom start date. Format: YYYY-MM-DD. Example: 2026-01-01"
        required: false
        type: string
      end:
        description: "Custom end date. Format: YYYY-MM-DD. Example: 2026-03-31"
        required: false
        type: string
      kind:
        description: "Report kind used for preview or publish. Ignored when command is run."
        required: true
        default: rankings
        type: choice
        options:
          - rankings
          - group
          - executive
          - repo
          - contributor
      orchestration_id:
        description: "Resume a failed or incomplete checkpointed orchestration by id."
        required: false
        type: string
      source_repo_ref:
        description: "Optional source repo branch or ref override. When omitted, run/preview/publish prefer SOURCE_REPO_REF and republish uses the source repo default branch."
        required: false
        type: string
      target_site:
        description: "Optional WordPress site override for publish or republish. Example: professionalizeagents.wordpress.com"
        required: false
        type: string
      target_category:
        description: "Optional category override for publish or republish. Example: sialkot-agents"
        required: false
        type: string
      notify_on_update_comments:
        description: "When true, existing-post WordPress API updates can add one FYI comment mentioning already-mentioned users."
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      command:
        required: true
        type: string
      mode:
        required: true
        type: string
      scope:
        required: true
        type: string
      scope_value:
        required: false
        type: string
      period_label:
        required: false
        type: string
      start:
        required: false
        type: string
      end:
        required: false
        type: string
      kind:
        required: false
        type: string
      orchestration_id:
        required: false
        type: string
      source_repo_ref:
        required: false
        type: string
      target_site:
        required: false
        type: string
      target_category:
        required: false
        type: string
      notify_on_update_comments:
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.WORKFLOW_TIMEOUT_MINUTES || '360') }}
    env:
      SOURCE_REPO: ${{ secrets.SOURCE_REPO }}
      SOURCE_REPO_REF: ${{ inputs.source_repo_ref || vars.SOURCE_REPO_REF }}
      SOURCE_REPO_REF_INPUT: ${{ inputs.source_repo_ref }}
      WORKFLOW_TARGET_SCOPE_VALUE_SECRET: ${{ secrets.WORKFLOW_TARGET_SCOPE_VALUE }}
    steps:
      - uses: actions/checkout@v4
      - name: Checkout source repository
        if: ${{ env.SOURCE_REPO != '' && env.SOURCE_REPO != github.repository }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          path: source-repo
      - name: Resolve source repository ref
        shell: bash
        env:
          REQUESTED_SOURCE_REPO_REF: ${{ inputs.command == 'republish' && env.SOURCE_REPO_REF_INPUT || (inputs.command != 'republish' && env.SOURCE_REPO_REF || '') }}
          SOURCE_REPO_REF_IS_EXPLICIT_INPUT: ${{ env.SOURCE_REPO_REF_INPUT != '' }}
        run: |
          APP_CHECKOUT_DIR="."
          if [ -n "$SOURCE_REPO" ] && [ "$SOURCE_REPO" != "${{ github.repository }}" ]; then
            APP_CHECKOUT_DIR="source-repo"
          fi

          cd "$APP_CHECKOUT_DIR"

          current_branch() {
            git symbolic-ref --quiet --short HEAD 2>/dev/null \
              || git remote show origin 2>/dev/null | sed -n '/HEAD branch/s/.*: //p' | head -n 1
          }

          DEFAULT_REF="$(current_branch)"
          if [ -z "$DEFAULT_REF" ]; then
            echo "Could not determine the current source repository default branch."
            exit 1
          fi

          REQUESTED_REF="$REQUESTED_SOURCE_REPO_REF"
          if [ -z "$REQUESTED_REF" ]; then
            echo "SOURCE_REPO_REF=$DEFAULT_REF" >> "$GITHUB_ENV"
            echo "Using source repository default branch: $DEFAULT_REF"
            exit 0
          fi

          if git fetch --depth=1 origin "$REQUESTED_REF" >/dev/null 2>&1; then
            git checkout --force FETCH_HEAD >/dev/null 2>&1
            echo "SOURCE_REPO_REF=$REQUESTED_REF" >> "$GITHUB_ENV"
            echo "Checked out requested source repository ref: $REQUESTED_REF"
            exit 0
          fi

          if [ "$SOURCE_REPO_REF_IS_EXPLICIT_INPUT" = "true" ]; then
            echo "Requested source_repo_ref '$REQUESTED_REF' could not be fetched from the source repository."
            exit 1
          fi

          echo "Repo-level SOURCE_REPO_REF '$REQUESTED_REF' is unavailable; falling back to source repository default branch '$DEFAULT_REF'."
          echo "SOURCE_REPO_REF=$DEFAULT_REF" >> "$GITHUB_ENV"
      - name: Resolve app directory
        shell: bash
        env:
          SOURCE_REPO_PAT: ${{ secrets.SOURCE_REPO_PAT }}
        run: |
          APP_DIR="."
          if [ -n "$SOURCE_REPO" ] && [ "$SOURCE_REPO" != "${{ github.repository }}" ]; then
            if [ -z "$SOURCE_REPO_PAT" ]; then
              echo "SOURCE_REPO_PAT must be configured when SOURCE_REPO points to a different repository."
              exit 1
            fi
            APP_DIR="source-repo"
          fi
          if [ ! -f "$APP_DIR/pyproject.toml" ]; then
            echo "No repo-review source tree was found in $APP_DIR."
            echo "If this workflow runs from a public orchestration repo, set SOURCE_REPO and SOURCE_REPO_PAT first."
            exit 1
          fi
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        shell: bash
        run: |
          cd "$APP_DIR"
          python -m pip install -e .[dev]
      - name: Validate workflow inputs
        shell: bash
        run: |
          COMMAND="${{ inputs.command }}"
          MODE="${{ inputs.mode }}"
          SCOPE_INPUT="${{ inputs.scope }}"
          SCOPE_VALUE_INPUT="${{ inputs.scope_value }}"
          DEFAULT_SCOPE="${{ vars.WORKFLOW_TARGET_SCOPE }}"
          DEFAULT_SCOPE_VALUE="$WORKFLOW_TARGET_SCOPE_VALUE_SECRET"
          DEFAULT_PERIOD_LABEL="${{ vars.WORKFLOW_TARGET_PERIOD_LABEL }}"
          DEFAULT_DATE_BASIS="${{ vars.WORKFLOW_TARGET_DATE_BASIS }}"
          START="${{ inputs.start }}"
          END="${{ inputs.end }}"
          PERIOD_LABEL_INPUT="${{ inputs.period_label }}"
          KIND="${{ inputs.kind }}"
          ORCHESTRATION_ID="${{ inputs.orchestration_id }}"
          TARGET_SITE_INPUT="${{ inputs.target_site }}"
          TARGET_CATEGORY_INPUT="${{ inputs.target_category }}"
          NOTIFY_ON_UPDATE_COMMENTS_INPUT="${{ inputs.notify_on_update_comments }}"

          SCOPE="$SCOPE_INPUT"
          if [ "$SCOPE_INPUT" = "all" ] && [ -z "$SCOPE_VALUE_INPUT" ] && [ -n "$DEFAULT_SCOPE" ]; then
            SCOPE="$DEFAULT_SCOPE"
          fi

          SCOPE_VALUE="$SCOPE_VALUE_INPUT"
          if [ -z "$SCOPE_VALUE" ] && [ -n "$DEFAULT_SCOPE_VALUE" ]; then
            SCOPE_VALUE="$DEFAULT_SCOPE_VALUE"
          fi

          PERIOD_LABEL="$PERIOD_LABEL_INPUT"
          if [ -z "$PERIOD_LABEL" ] && [ "$MODE" != "custom" ] && [ -n "$DEFAULT_PERIOD_LABEL" ]; then
            PERIOD_LABEL="$DEFAULT_PERIOD_LABEL"
          fi

          DATE_BASIS="$DEFAULT_DATE_BASIS"
          if [ -z "$DATE_BASIS" ]; then
            DATE_BASIS="authored_date"
          fi

          case "$COMMAND" in
            run|preview|publish|republish) ;;
            *)
              echo "command must be one of: run, preview, publish, republish."
              exit 1
              ;;
          esac

          if [ -n "$ORCHESTRATION_ID" ]; then
            echo "Resuming orchestration: $ORCHESTRATION_ID"
          elif [ "$SCOPE" != "all" ] && [ -z "$SCOPE_VALUE" ]; then
            echo "scope_value is required when scope is not 'all'."
            exit 1
          fi

          if [ -z "$ORCHESTRATION_ID" ] && [ "$MODE" = "custom" ]; then
            if [ -z "$START" ] || [ -z "$END" ]; then
              echo "custom mode requires both start and end in YYYY-MM-DD format."
              exit 1
            fi
          fi

          if [ -z "$ORCHESTRATION_ID" ] && [ "$MODE" != "custom" ] && { [ -n "$START" ] || [ -n "$END" ]; }; then
            echo "start/end are only used when mode is custom."
            exit 1
          fi

          if [ -z "$ORCHESTRATION_ID" ] && [ "$MODE" = "custom" ] && [ -n "$PERIOD_LABEL" ]; then
            echo "period_label should not be used when mode is custom."
            exit 1
          fi

          case "$KIND" in
            rankings|group|executive|repo|contributor|"") ;;
            *)
              echo "kind must be one of: rankings, group, executive, repo, contributor."
              exit 1
              ;;
          esac

          echo "EFFECTIVE_MODE=$MODE" >> "$GITHUB_ENV"
          echo "EFFECTIVE_SCOPE=$SCOPE" >> "$GITHUB_ENV"
          echo "EFFECTIVE_SCOPE_VALUE=$SCOPE_VALUE" >> "$GITHUB_ENV"
          echo "EFFECTIVE_PERIOD_LABEL=$PERIOD_LABEL" >> "$GITHUB_ENV"
          echo "EFFECTIVE_START=$START" >> "$GITHUB_ENV"
          echo "EFFECTIVE_END=$END" >> "$GITHUB_ENV"
          echo "EFFECTIVE_DATE_BASIS=$DATE_BASIS" >> "$GITHUB_ENV"
          echo "EFFECTIVE_ORCHESTRATION_ID=$ORCHESTRATION_ID" >> "$GITHUB_ENV"
          echo "EFFECTIVE_TARGET_SITE=$TARGET_SITE_INPUT" >> "$GITHUB_ENV"
          echo "EFFECTIVE_TARGET_CATEGORY=$TARGET_CATEGORY_INPUT" >> "$GITHUB_ENV"
          echo "EFFECTIVE_NOTIFY_ON_UPDATE_COMMENTS=$NOTIFY_ON_UPDATE_COMMENTS_INPUT" >> "$GITHUB_ENV"

          EFFECTIVE_PUBLISHING_BACKEND="${{ vars.WORKFLOW_PUBLISHING_BACKEND }}"
          if { [ "$COMMAND" = "publish" ] || [ "$COMMAND" = "republish" ]; } && [ -n "$TARGET_SITE_INPUT" ]; then
            EFFECTIVE_PUBLISHING_BACKEND="wordpress_api"
          fi
          if [ -z "$EFFECTIVE_PUBLISHING_BACKEND" ]; then
            EFFECTIVE_PUBLISHING_BACKEND="wordpress_email"
          fi
          echo "EFFECTIVE_PUBLISHING_BACKEND=$EFFECTIVE_PUBLISHING_BACKEND" >> "$GITHUB_ENV"
      - name: Generate workflow config
        shell: bash
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS }}
          SMTP_SSL: ${{ vars.SMTP_SSL }}
          WORKFLOW_LLM_ENABLED: ${{ vars.WORKFLOW_LLM_ENABLED }}
          WORKFLOW_WORDPRESS_ENABLED: ${{ vars.WORKFLOW_WORDPRESS_ENABLED }}
          WORKFLOW_WORDPRESS_PREVIEW_ONLY: ${{ vars.WORKFLOW_WORDPRESS_PREVIEW_ONLY }}
          WORKFLOW_WORDPRESS_DEFAULT_STATUS: ${{ vars.WORKFLOW_WORDPRESS_DEFAULT_STATUS }}
          WORKFLOW_WORDPRESS_API_COMMENT_ON_UPDATE_WITH_MENTIONS: ${{ vars.WORKFLOW_WORDPRESS_API_COMMENT_ON_UPDATE_WITH_MENTIONS }}
          WORKFLOW_SMTP_ENABLED: ${{ vars.WORKFLOW_SMTP_ENABLED }}
          WORKFLOW_PROJECT_MAX_ATTEMPTS: ${{ vars.WORKFLOW_PROJECT_MAX_ATTEMPTS }}
          WORKFLOW_METRICS_ENABLED: ${{ vars.WORKFLOW_METRICS_ENABLED }}
          WORKFLOW_METRICS_ENDPOINT: ${{ vars.WORKFLOW_METRICS_ENDPOINT }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          export WORKFLOW_CONFIG_PATH="$RUNNER_TEMP/repo-review-actions.yaml"
          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          def as_bool(name: str, default: bool) -> bool:
              value = os.getenv(name, "").strip().lower()
              if not value:
                  return default
              return value in {"1", "true", "yes", "on"}

          def as_int(name: str, default: int) -> int:
              value = os.getenv(name, "").strip()
              if not value:
                  return default
              return int(value)

          data = {
              "runtime": {
                  "profile": "github_actions",
              },
              "gitlab": {
                  "base_url": os.getenv("GITLAB_URL", "").strip() or None,
                  "pat_env": "GITLAB_PAT",
                  "include_merge_requests": True,
              },
              "target": {
                  "mode": os.getenv("EFFECTIVE_MODE", "monthly"),
                  "scope": os.getenv("EFFECTIVE_SCOPE", "all"),
                  "scope_value": os.getenv("EFFECTIVE_SCOPE_VALUE", "").strip() or None,
                  "period_label": os.getenv("EFFECTIVE_PERIOD_LABEL", "").strip() or None,
                  "period": {
                      "start": os.getenv("EFFECTIVE_START", "").strip() or None,
                      "end": os.getenv("EFFECTIVE_END", "").strip() or None,
                  },
              },
              "analysis": {
                  "default_date_basis": os.getenv("EFFECTIVE_DATE_BASIS", "authored_date"),
                  "default_timezone": "Asia/Karachi",
                  "category_detection": "hybrid",
                  "classify_unknown_as": "automation_script",
                  "weights_profile": "default",
                  "include_mr_analysis": True,
                  "include_repo_snapshot_analysis": True,
                  "max_run_seconds": 0,
                  "max_project_seconds": 0,
                  "max_semantic_review_seconds": 0,
              },
              "reports": {
                  "output_dir": "artifacts",
                  "save_html": True,
                  "save_json": True,
                  "save_csv": True,
                  "include_confidence_notes": True,
                  "include_fairness_notes": True,
              },
              "rankings": {
                  "enable_overall": True,
                  "enable_category": True,
                  "enable_improvement": True,
                  "enable_watchlist": True,
              },
              "publishing": {
                  "backend": os.getenv("EFFECTIVE_PUBLISHING_BACKEND", "").strip() or "wordpress_email",
              },
              "wordpress": {
                  "enabled": as_bool("WORKFLOW_WORDPRESS_ENABLED", False),
                  "email_target_env": "WORDPRESS_POST_EMAIL",
                  "default_status": os.getenv("WORKFLOW_WORDPRESS_DEFAULT_STATUS", "").strip() or "private",
                  "preview_only": as_bool("WORKFLOW_WORDPRESS_PREVIEW_ONLY", True),
                  "default_publish_report_types": [
                      "executive_summary",
                      "group_summary",
                      "rankings_report",
                  ],
                  "category_by_report_type": {
                      "contributor_report": "Contributor Review",
                      "repository_report": "Repository Report",
                      "group_summary": "Monthly Report",
                      "executive_summary": "Executive Summary",
                      "rankings_report": "Rankings",
                  },
              },
              "wordpress_api": {
                  "enabled": True,
                  "site_env": "WORDPRESS_API_SITE",
                  "access_token_env": "WORDPRESS_API_ACCESS_TOKEN",
                  "client_id_env": "WORDPRESS_API_CLIENT_ID",
                  "client_secret_env": "WORDPRESS_API_CLIENT_SECRET",
                  "username_env": "WORDPRESS_API_USERNAME",
                  "password_env": "WORDPRESS_API_PASSWORD",
                  "update_by_slug": True,
                  "comment_on_update_with_mentions": as_bool(
                      "EFFECTIVE_NOTIFY_ON_UPDATE_COMMENTS",
                      as_bool("WORKFLOW_WORDPRESS_API_COMMENT_ON_UPDATE_WITH_MENTIONS", False),
                  ),
              },
              "smtp": {
                  "enabled": as_bool("WORKFLOW_SMTP_ENABLED", True),
                  "host_env": "SMTP_HOST",
                  "port_env": "SMTP_PORT",
                  "username_env": "SMTP_USERNAME",
                  "password_env": "SMTP_PASSWORD",
                  "from_env": "SMTP_FROM",
                  "from_name_env": "SMTP_FROM_NAME",
                  "starttls_env": "SMTP_STARTTLS",
                  "ssl_env": "SMTP_SSL",
                  "default_port": as_int("SMTP_PORT", 587),
                  "default_starttls": as_bool("SMTP_STARTTLS", True),
                  "default_ssl": as_bool("SMTP_SSL", False),
              },
              "resend": {
                  "enabled": False,
              },
              "mailjet": {
                  "enabled": False,
              },
              "metrics": {
                  "enabled": as_bool("WORKFLOW_METRICS_ENABLED", False),
                  "endpoint": os.getenv("WORKFLOW_METRICS_ENDPOINT", "").strip()
                      or "https://script.google.com/macros/s/AKfycbyCHwElrM6RcYLi0JNQAkJmzGrBjAhf28mKXVyub_6SdaZ2ITvzCwfM5xCLE7rmuxio/exec",
                  "token_env": "METRICS_API_TOKEN",
                  "agent_name": "CodeAnalyzer",
                  "agent_owner": "Salman Sarfraz",
                  "job_type": "Repository Intelligence Report",
                  "product": "NA",
                  "platform": "NA",
                  "website": "NA",
                  "website_section": "NA",
                  "item_name": "auto",
                  "fail_on_error": False,
              },
              "llm": {
                  "enabled": as_bool("WORKFLOW_LLM_ENABLED", False),
                  "provider": "professionalize",
                  "base_url_env": "PROFESSIONALIZE_BASE_URL",
                  "api_key_env": "PROFESSIONALIZE_API_KEY",
                  "model_env": "PROFESSIONALIZE_LLM_MODEL",
              },
              "embeddings": {
                  "enabled": False,
                  "provider": "professionalize",
                  "base_url_env": "PROFESSIONALIZE_BASE_URL",
                  "api_key_env": "PROFESSIONALIZE_API_KEY",
                  "model_env": "PROFESSIONALIZE_EMBEDDING_MODEL",
              },
              "storage": {
                  "database_url": os.getenv("TURSO_DATABASE_URL", "").strip() or "sqlite:///repo_review.db",
              },
              "orchestration": {
                  "enabled": True,
                  "deadline_buffer_seconds": 1200,
                  "project_max_attempts": as_int("WORKFLOW_PROJECT_MAX_ATTEMPTS", 3),
              },
          }

          output_path = Path(os.environ["WORKFLOW_CONFIG_PATH"])
          output_path.write_text(yaml.safe_dump(data, sort_keys=False), encoding="utf-8")
          print(f"Generated workflow config at {output_path}")
          PY
          echo "WORKFLOW_CONFIG_PATH=$WORKFLOW_CONFIG_PATH" >> "$GITHUB_ENV"
      - name: Resolve saved run for republish
        if: ${{ inputs.command == 'republish' }}
        shell: bash
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INPUT_KIND: ${{ inputs.kind }}
        run: |
          cd "$APP_DIR"
          python - <<'PY'
          import os
          from repo_review.utils.dates import custom_date_range, previous_completed_period
          from repo_review.workflows.republish_runs import resolve_latest_saved_run

          mode = os.environ["EFFECTIVE_MODE"]
          period_label = os.environ.get("EFFECTIVE_PERIOD_LABEL", "").strip()
          if mode == "custom":
              period_label = custom_date_range(
                  os.environ["EFFECTIVE_START"],
                  os.environ["EFFECTIVE_END"],
                  "Asia/Karachi",
              ).label
          elif not period_label:
              period_label = previous_completed_period(mode, "Asia/Karachi").label

          scope_value = os.environ.get("EFFECTIVE_SCOPE_VALUE", "").strip() or "all"
          ref = resolve_latest_saved_run(
              os.environ["TURSO_DATABASE_URL"],
              mode=mode,
              scope_type=os.environ["EFFECTIVE_SCOPE"],
              scope_value=scope_value,
              period_label=period_label,
              kind=os.environ.get("INPUT_KIND", "").strip() or None,
          )
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"REPUBLISH_SOURCE_RUN_ID={ref.run_id}\n")
              handle.write(f"REPUBLISH_ARTIFACT_REPO={ref.github_repo_full_name}\n")
              handle.write(f"REPUBLISH_ARTIFACT_WORKFLOW_RUN_ID={ref.github_workflow_run_id}\n")
              handle.write(f"REPUBLISH_ARTIFACT_NAME={ref.artifact_name}\n")
          print(f"Resolved saved run {ref.run_id} from {ref.github_repo_full_name} workflow run {ref.github_workflow_run_id}.")
          PY
      - name: Download saved artifact bundle for republish
        if: ${{ inputs.command == 'republish' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$APP_DIR"
          python - <<'PY'
          import os
          from pathlib import Path
          from repo_review.workflows.republish_runs import SavedRunArtifactRef, download_saved_run_artifact

          destination = Path(os.environ["RUNNER_TEMP"]) / "republish-source"
          ref = SavedRunArtifactRef(
              run_id=os.environ["REPUBLISH_SOURCE_RUN_ID"],
              github_repo_full_name=os.environ["REPUBLISH_ARTIFACT_REPO"],
              github_workflow_run_id=os.environ["REPUBLISH_ARTIFACT_WORKFLOW_RUN_ID"],
              artifact_name=os.environ["REPUBLISH_ARTIFACT_NAME"],
          )
          artifact_root = download_saved_run_artifact(
              ref,
              token=os.environ["GITHUB_TOKEN"],
              destination_dir=destination,
          )
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"REPUBLISH_ARTIFACT_DIR={artifact_root}\n")
          print(f"Downloaded saved artifact bundle to {artifact_root}")
          PY
      - name: Run repo review agent
        shell: bash
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
          WORDPRESS_POST_EMAIL: ${{ secrets.WORDPRESS_POST_EMAIL }}
          WORDPRESS_API_SITE: ${{ secrets.WORDPRESS_API_SITE }}
          WORDPRESS_API_ACCESS_TOKEN: ${{ secrets.WORDPRESS_API_ACCESS_TOKEN }}
          WORDPRESS_API_CLIENT_ID: ${{ secrets.WORDPRESS_API_CLIENT_ID }}
          WORDPRESS_API_CLIENT_SECRET: ${{ secrets.WORDPRESS_API_CLIENT_SECRET }}
          WORDPRESS_API_USERNAME: ${{ secrets.WORDPRESS_API_USERNAME }}
          WORDPRESS_API_PASSWORD: ${{ secrets.WORDPRESS_API_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS }}
          SMTP_SSL: ${{ vars.SMTP_SSL }}
          PROFESSIONALIZE_API_KEY: ${{ secrets.PROFESSIONALIZE_API_KEY }}
          PROFESSIONALIZE_BASE_URL: ${{ secrets.PROFESSIONALIZE_BASE_URL }}
          PROFESSIONALIZE_LLM_MODEL: ${{ vars.PROFESSIONALIZE_LLM_MODEL }}
          PROFESSIONALIZE_EMBEDDING_MODEL: ${{ vars.PROFESSIONALIZE_EMBEDDING_MODEL }}
          METRICS_API_TOKEN: ${{ secrets.METRICS_API_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_REVIEW_WORKFLOW_FILE: manual.yml
          INPUT_KIND: ${{ inputs.kind }}
        run: |
          cd "$APP_DIR"
          DEADLINE_AT=$(( $(date +%s) + (${{ vars.WORKFLOW_TIMEOUT_MINUTES || '360' }} * 60) ))
          export REPO_REVIEW_WORKFLOW_DEADLINE_AT="$DEADLINE_AT"
          COMMAND="${{ inputs.command }}"
          if [ "$COMMAND" = "run" ]; then
            CMD="python -u -m repo_review run $EFFECTIVE_MODE --config '$WORKFLOW_CONFIG_PATH' --scope '$EFFECTIVE_SCOPE'"
          elif [ "$COMMAND" = "republish" ]; then
            OUTPUT_DIR="artifacts/republished/$REPUBLISH_SOURCE_RUN_ID/publish"
            CMD="python -u -m repo_review republish --config '$WORKFLOW_CONFIG_PATH' --artifact-dir '$REPUBLISH_ARTIFACT_DIR' --output-dir '$OUTPUT_DIR'"
            if [ -n "${{ inputs.kind }}" ]; then CMD="$CMD --kind '${{ inputs.kind }}'"; fi
          else
            CMD="python -u -m repo_review $COMMAND ${{ inputs.kind }} --config '$WORKFLOW_CONFIG_PATH' --scope '$EFFECTIVE_SCOPE'"
          fi

          if [ "$COMMAND" != "republish" ]; then
            if [ -n "$EFFECTIVE_SCOPE_VALUE" ]; then CMD="$CMD --scope-value '$EFFECTIVE_SCOPE_VALUE'"; fi
            if [ -n "$EFFECTIVE_PERIOD_LABEL" ]; then CMD="$CMD --period '$EFFECTIVE_PERIOD_LABEL'"; fi
            if [ -n "$EFFECTIVE_START" ]; then CMD="$CMD --start '$EFFECTIVE_START'"; fi
            if [ -n "$EFFECTIVE_END" ]; then CMD="$CMD --end '$EFFECTIVE_END'"; fi
            if [ -n "$EFFECTIVE_DATE_BASIS" ]; then CMD="$CMD --date-basis '$EFFECTIVE_DATE_BASIS'"; fi
            if [ -n "$EFFECTIVE_ORCHESTRATION_ID" ]; then CMD="$CMD --orchestration-id '$EFFECTIVE_ORCHESTRATION_ID'"; fi
          fi
          if { [ "$COMMAND" = "publish" ] || [ "$COMMAND" = "republish" ]; }; then
            if [ -n "$EFFECTIVE_TARGET_SITE" ]; then CMD="$CMD --target-site '$EFFECTIVE_TARGET_SITE'"; fi
            if [ -n "$EFFECTIVE_TARGET_CATEGORY" ]; then CMD="$CMD --target-category '$EFFECTIVE_TARGET_CATEGORY'"; fi
          fi

          echo "Executing: $CMD"
          TIMEOUT_MARKER="$RUNNER_TEMP/codeanalyzer-agent-timed-out"
          rm -f "$TIMEOUT_MARKER"
          WORKFLOW_TIMEOUT_MINUTES="${{ vars.WORKFLOW_TIMEOUT_MINUTES || '360' }}"
          AGENT_TIMEOUT_MINUTES="${{ vars.WORKFLOW_AGENT_TIMEOUT_MINUTES || '' }}"
          case "$WORKFLOW_TIMEOUT_MINUTES" in ''|*[!0-9]*) WORKFLOW_TIMEOUT_MINUTES=360 ;; esac
          if [ -z "$AGENT_TIMEOUT_MINUTES" ]; then
            AGENT_TIMEOUT_MINUTES=$(( WORKFLOW_TIMEOUT_MINUTES - 30 ))
          fi
          case "$AGENT_TIMEOUT_MINUTES" in ''|*[!0-9]*) AGENT_TIMEOUT_MINUTES=330 ;; esac
          if [ "$AGENT_TIMEOUT_MINUTES" -lt 1 ]; then
            AGENT_TIMEOUT_MINUTES=330
          fi
          echo "Agent timeout budget: ${AGENT_TIMEOUT_MINUTES}m before GitHub job timeout recovery."
          set +e
          timeout --kill-after=60s "${AGENT_TIMEOUT_MINUTES}m" bash -lc "$CMD"
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 124 ] || [ "$STATUS" -eq 137 ]; then
            touch "$TIMEOUT_MARKER"
            echo "CODEANALYZER_AGENT_TIMED_OUT=true" >> "$GITHUB_ENV"
            echo "CodeAnalyzer agent timed out before the GitHub job limit; recovery step will pause and continue orchestration."
            exit 0
          fi
          exit "$STATUS"
      - name: Recover timed-out orchestration
        if: ${{ always() }}
        shell: bash
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_REVIEW_WORKFLOW_FILE: manual.yml
        run: |
          cd "$APP_DIR"
          TIMEOUT_MARKER="$RUNNER_TEMP/codeanalyzer-agent-timed-out"
          if [ "$CODEANALYZER_AGENT_TIMED_OUT" != "true" ] && [ ! -f "$TIMEOUT_MARKER" ]; then
            echo "Skipping timeout recovery because the agent step did not report a controlled timeout."
            exit 0
          fi
          ORCHESTRATION_ID="${EFFECTIVE_ORCHESTRATION_ID:-${CODEANALYZER_ORCHESTRATION_ID:-}}"
          if [ -z "$ORCHESTRATION_ID" ]; then
            echo "No orchestration id is available for timeout recovery."
            exit 1
          fi
          CMD="python -u -m repo_review orchestration recover-timeout --config '$WORKFLOW_CONFIG_PATH' --orchestration-id '$ORCHESTRATION_ID' --command '${{ inputs.command }}' --kind '${{ inputs.kind }}' --mode '$EFFECTIVE_MODE' --scope '$EFFECTIVE_SCOPE'"
          if [ -n "$EFFECTIVE_SCOPE_VALUE" ]; then CMD="$CMD --scope-value '$EFFECTIVE_SCOPE_VALUE'"; fi
          if [ -n "$EFFECTIVE_PERIOD_LABEL" ]; then CMD="$CMD --period '$EFFECTIVE_PERIOD_LABEL'"; fi
          if [ -n "$EFFECTIVE_START" ]; then CMD="$CMD --start '$EFFECTIVE_START'"; fi
          if [ -n "$EFFECTIVE_END" ]; then CMD="$CMD --end '$EFFECTIVE_END'"; fi
          echo "Executing timeout recovery: $CMD"
          eval "$CMD"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CODEANALYZER_ARTIFACT_NAME != '' && env.CODEANALYZER_ARTIFACT_NAME || format('repo-review-artifacts-{0}', github.run_id) }}
          path: |
            artifacts/
            source-repo/artifacts/
